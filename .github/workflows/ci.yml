name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Flake check
        run: nix flake check

      - name: Ruff lint
        run: nix develop -c ruff check .

      - name: Ruff format check
        run: nix develop -c ruff format --check .

      - name: Typecheck data pipelines
        run: |
          for d in candidates transcripts polling-stations symbols; do
            nix develop -c bash -c "cd $d && uv sync --frozen && ty check"
          done

      - name: Install dependencies
        run: nix develop -c bash -c "cd website && pnpm install --frozen-lockfile"

      - name: Format check
        run: nix develop -c bash -c "cd website && pnpm format:check"

      - name: Lint
        run: nix develop -c bash -c "cd website && pnpm lint"

      - name: Typecheck
        run: nix develop -c bash -c "cd website && pnpm typecheck"

      - name: Build
        run: nix develop -c bash -c "cd website && pnpm build"
